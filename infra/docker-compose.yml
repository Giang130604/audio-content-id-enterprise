services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: audio_id
      POSTGRES_PASSWORD: audio_id
      POSTGRES_DB: audio_id
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audio_id -d audio_id"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.7
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.9
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: audioid
      MINIO_ROOT_PASSWORD: audioid-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env.example
    command: uvicorn apps.api.audio_content_api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redpanda:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env.example
    command: python -m apps.workers.audio_content_workers.main
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redpanda:
        condition: service_started
      minio:
        condition: service_started

volumes:
  postgres-data:
  qdrant-data:
  redpanda-data:
  minio-data:

